<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Semantic Cache Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f8f9fc;
      --surface:   #ffffff;
      --border:    #e4e7ef;
      --accent:    #4361ee;
      --accent-lt: #eef1ff;
      --green:     #16a34a;
      --green-lt:  #dcfce7;
      --amber:     #d97706;
      --amber-lt:  #fef3c7;
      --red:       #dc2626;
      --red-lt:    #fee2e2;
      --text:      #111827;
      --muted:     #6b7280;
      --radius:    14px;
      --shadow:    0 1px 4px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.06);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 20px 80px;
    }

    header { text-align: center; margin-bottom: 40px; }

    .badge {
      display: inline-block;
      padding: 4px 14px;
      background: var(--accent-lt);
      color: var(--accent);
      border-radius: 99px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      margin-bottom: 16px;
    }

    header h1 { font-size: 2rem; font-weight: 700; margin-bottom: 8px; }
    header p  { color: var(--muted); font-size: 0.95rem; max-width: 480px; margin: 0 auto; }

    /* ── Search card ── */
    .search-card {
      width: 100%;
      max-width: 720px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px;
      margin-bottom: 28px;
    }

    .field-label { font-size: 0.8rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }

    .search-row { display: flex; gap: 10px; margin-bottom: 16px; }
    .search-row textarea {
      flex: 1;
      padding: 12px 16px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      resize: vertical;
      min-height: 60px;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-row textarea:focus { border-color: var(--accent); }

    .cube-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .cube-row select {
      padding: 9px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 0.9rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      background: #fff;
    }

    .btn-ask {
      padding: 10px 28px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .btn-ask:hover { background: #3251d4; }
    .btn-ask:active { transform: scale(0.97); }
    .btn-ask:disabled { background: var(--muted); cursor: not-allowed; }

    /* ── Examples ── */
    .examples { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; }
    .example-chip {
      padding: 6px 14px;
      background: var(--accent-lt);
      color: var(--accent);
      border-radius: 99px;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: background 0.15s;
    }
    .example-chip:hover { background: #dde4ff; }

    /* ── Result card ── */
    .result-card {
      width: 100%;
      max-width: 720px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      animation: fadeUp 0.3s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
    }

    .status-pill {
      padding: 5px 14px;
      border-radius: 99px;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .status-pill.hit      { background: var(--green-lt);  color: var(--green); }
    .status-pill.template  { background: var(--green-lt);  color: var(--green); }
    .status-pill.miss      { background: var(--amber-lt);  color: var(--amber); }
    .status-pill.patched   { background: #dbeafe;           color: #1d4ed8; }

    .result-header .timing {
      margin-left: auto;
      font-size: 0.82rem;
      color: var(--muted);
    }

    .result-body { padding: 20px 24px; }

    .meta-row { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 16px; }
    .meta-item { display: flex; flex-direction: column; gap: 2px; }
    .meta-label { font-size: 0.72rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .meta-value { font-size: 0.9rem; font-weight: 500; }

    .similarity-bar { display: flex; align-items: center; gap: 10px; margin-top: 4px; }
    .bar-track { flex: 1; height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; }
    .bar-fill  { height: 100%; border-radius: 99px; background: var(--green); transition: width 0.5s ease; }

    .mdx-label { font-size: 0.78rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .mdx-block {
      background: #f1f3f9;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.82rem;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 240px;
      overflow-y: auto;
    }

    /* ── Feedback row ── */
    .feedback-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      background: var(--bg);
    }
    .feedback-label { font-size: 0.85rem; color: var(--muted); }
    .btn-feedback {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 18px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      border: 1.5px solid var(--border);
      background: var(--surface);
      transition: all 0.15s;
    }
    .btn-feedback:hover { border-color: var(--accent); color: var(--accent); }
    .btn-feedback.positive:hover { border-color: var(--green); color: var(--green); background: var(--green-lt); }
    .btn-feedback.negative:hover { border-color: var(--red); color: var(--red); background: var(--red-lt); }
    .btn-feedback.active-pos { border-color: var(--green); color: var(--green); background: var(--green-lt); }
    .btn-feedback.active-neg { border-color: var(--red); color: var(--red); background: var(--red-lt); }
    .feedback-sent { font-size: 0.82rem; color: var(--green); font-weight: 500; }

    /* ── Paraphrase notice ── */
    .paraphrase-notice {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 24px;
      background: var(--accent-lt);
      border-top: 1px solid var(--border);
      font-size: 0.82rem;
      color: var(--accent);
    }
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid var(--accent);
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Spinner overlay ── */
    .loading-row { display: flex; align-items: center; gap: 12px; padding: 20px 24px; color: var(--muted); font-size: 0.9rem; }

    /* ── Admin link ── */
    .admin-link { margin-top: 40px; font-size: 0.85rem; color: var(--muted); }
    .admin-link a { color: var(--accent); text-decoration: none; }
    .admin-link a:hover { text-decoration: underline; }

    .hidden { display: none !important; }

  /* SSAS result table */
  .ssas-section { margin-top: 18px; }
  .ssas-btn {
    display: inline-flex; align-items: center; gap: 7px;
    background: linear-gradient(135deg,#7c3aed,#4f46e5);
    color: #fff; border: none; border-radius: 8px;
    padding: 8px 18px; font-size: .85rem; font-weight: 600;
    cursor: pointer; transition: opacity .2s;
  }
  .ssas-btn:disabled { opacity: .5; cursor: not-allowed; }
  .ssas-btn:hover:not(:disabled) { opacity: .85; }
  .result-table-wrap { overflow-x: auto; margin-top: 12px; border-radius: 8px; border: 1px solid var(--border); }
  .result-table { width: 100%; border-collapse: collapse; font-size: .82rem; }
  .result-table th { background: var(--surface); color: var(--muted); font-weight: 600;
    padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap; }
  .result-table td { padding: 7px 12px; border-bottom: 1px solid var(--border); color: var(--fg); }
  .result-table tr:last-child td { border-bottom: none; }
  .result-table tr:hover td { background: rgba(255,255,255,.03); }
  .ssas-meta { font-size: .75rem; color: var(--muted); margin-top: 6px; }
  </style>
</head>
<body>

<header>
  <div class="badge">🔍 Semantic Cache</div>
  <h1>Cache Demo</h1>
  <p>Ask a business question. If it's been asked before, the answer comes from cache instantly. Otherwise, the LLM generates it — and caches it for next time.</p>
</header>

<!-- Search -->
  <div class="search-card">
    <div class="field-label">Your question</div>
    <div class="search-row">
      <textarea id="question" placeholder="e.g. What is the total accruement for Turkey in 2025?" rows="2"></textarea>
    </div>
    <div style="display:flex;align-items:center;gap:10px;margin-top:4px">
      <button class="btn-ask" id="askBtn" onclick="ask()">Ask →</button>
      <span style="font-size:.78rem;color:var(--muted)">The system will automatically find the right cube.</span>
    </div>

    <div class="examples">
      <span class="field-label" style="align-self:center; margin-bottom:0">Try:</span>
      <button class="example-chip" onclick="setQ('What is the total accruement for Turkey in 2025?')">Total accruement Turkey 2025</button>
      <button class="example-chip" onclick="setQ('Show me vessel waiting times for 2024')">Vessel waiting times 2024</button>
      <button class="example-chip" onclick="setQ('How many vessel orders were there in 2025?')">Vessel orders count 2025</button>
    </div>
</div>

<!-- Result -->
<div id="result" class="result-card hidden"></div>

<div class="admin-link">← Back to <a href="/">Admin Panel</a></div>

<script>
  let currentQuestion  = '';
  let currentCube      = '';
  let currentPairId    = null;
  let currentMdx       = '';
  let currentFeedback  = null;

  function setQ(q) {
    document.getElementById('question').value = q;
  }

  async function ask() {
    const question = document.getElementById('question').value.trim();
    if (!question) return;

    currentQuestion = question;
    currentCube     = null;
    currentPairId   = null;
    currentMdx      = '';
    document.getElementById('ssasResult') && (document.getElementById('ssasResult').innerHTML = '');
    currentFeedback = null;

    const btn = document.getElementById('askBtn');
    btn.disabled = true;
    btn.textContent = 'Searching…';

    const resultEl = document.getElementById('result');
    resultEl.classList.remove('hidden');
    resultEl.innerHTML = `
      <div class="loading-row">
        <div class="spinner"></div>
        Searching across all cubes…
      </div>`;

    try {
      const res  = await fetch('/demo/query', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question }),
      });
      const data = await res.json();
      currentCube   = data.cube_name;
      currentPairId = data.pair_id || null;
      renderResult(data);
    } catch (e) {
      resultEl.innerHTML = `<div class="loading-row" style="color:#dc2626">Error: ${e.message}</div>`;
    } finally {
      btn.disabled    = false;
      btn.textContent = 'Ask →';
    }
  }

  function renderResult(d) {
    currentMdx = d.mdx || '';
    const isHit      = d.status === 'hit';
    const isTemplate = d.status === 'template';
    const isPatched  = d.status === 'patched';
    const isMiss     = d.status === 'miss';

    const pillClass = isHit || isTemplate ? (isTemplate ? 'template' : 'hit')
      : isPatched ? 'patched' : 'miss';
    const pillLabel = isHit     ? 'Cache Hit'
      : isTemplate ? 'Template Hit'
      : isPatched  ? 'Patched'
      : 'Cache Miss';
    const sourceLabel = isHit     ? 'Served from Qdrant'
      : isTemplate ? 'Filled from MDX template'
      : isPatched  ? 'MDX adapted from cache'
      : 'Generated by LLM';

    const mismatchBadge = (isPatched || isTemplate) && d.mismatch ? (() => {
      const labels = { year: 'Year adjusted', entity: 'Entity adapted' };
      return `<span style="font-size:.72rem;background:#fef3c7;color:#92400e;padding:2px 8px;
        border-radius:99px;margin-left:8px;font-weight:600">
        ${labels[d.mismatch] || d.mismatch}</span>`;
    })() : '';

    const sim    = d.similarity != null ? (d.similarity * 100).toFixed(1) : null;
    const simBar = sim ? `
      <div class="similarity-bar">
        <div class="bar-track"><div class="bar-fill" style="width:${sim}%"></div></div>
        <span style="font-size:.8rem;color:var(--muted)">${sim}%</span>
      </div>` : '';

    const matchedRow = d.matched_question ? `
      <div class="meta-item">
        <span class="meta-label">${isPatched ? 'Based on' : 'Matched question'}</span>
        <span class="meta-value" style="font-style:italic;color:var(--muted)">
          "${escHtml(d.matched_question)}"
        </span>
      </div>` : '';

    const paraphraseNotice = isMiss ? `
      <div class="paraphrase-notice">
        <div class="spinner"></div>
        Generating similar phrasings and caching them in the background…
      </div>` : '';

    document.getElementById('result').innerHTML = `
      <div class="result-header">
        <div class="status-pill ${pillClass}">${pillLabel}</div>${mismatchBadge}
        <span style="font-size:.82rem;color:var(--muted)">${sourceLabel}</span>
        <span class="timing">${d.response_time_ms} ms</span>
      </div>

      <div class="result-body">
        <div class="meta-row">
          ${sim != null ? `
          <div class="meta-item">
            <span class="meta-label">Similarity</span>
            ${simBar}
          </div>` : ''}
          ${matchedRow}
          <div class="meta-item">
            <span class="meta-label">Cube</span>
            <span class="meta-value" style="font-size:.82rem;background:var(--accent-lt);color:var(--accent);padding:2px 10px;border-radius:99px">${escHtml(d.cube_name)}</span>
          </div>
        </div>

        <div class="mdx-label">Generated MDX Query</div>
        <div class="mdx-block">${escHtml(d.mdx || '(no MDX)')}</div>

        ${d.mdx ? `
        <div class="ssas-section">
          <button class="ssas-btn" id="runBtn" onclick="runOnSSAS()">
            &#9654;&nbsp; Run on SSAS
          </button>
          <div id="ssasResult"></div>
        </div>` : ''}
      </div>

      <div class="feedback-row" id="feedbackRow">
        <span class="feedback-label">Was this answer helpful?</span>
        <button class="btn-feedback positive" id="btnPos" onclick="sendFeedback('positive')">Yes, helpful</button>
        <button class="btn-feedback negative" id="btnNeg" onclick="sendFeedback('negative')">Flag issue</button>
        <span class="feedback-sent hidden" id="feedbackSent"></span>
      </div>

      ${paraphraseNotice}
    `;
  }

  async function runOnSSAS() {
    if (!currentMdx) return;
    const btn = document.getElementById('runBtn');
    if (btn) { btn.disabled = true; btn.textContent = 'Running...'; }
    const out = document.getElementById('ssasResult');
    if (out) out.innerHTML = '<div style="font-size:.8rem;color:var(--muted);margin-top:8px">Querying SSAS…</div>';

    try {
      const res  = await fetch('/demo/execute', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          mdx: currentMdx,
          cube_name: currentCube,
          pair_id: currentPairId,
          question: currentQuestion,
        }),
      });
      const data = await res.json();

      if (!res.ok || data.status === 'failed') {
        const message = data.detail || data.error || 'SSAS sorgusu çalıştırılamadı.';
        if (out) out.innerHTML = `<div style="color:#dc2626;font-size:.8rem;margin-top:8px">Hata: ${escHtml(message)}</div>`;
        return;
      }

      currentMdx = data.executed_mdx || currentMdx;
      const attemptLabels = {
        original: 'Orijinal MDX doğrulandı',
        year_fix: 'Yıl filtresi düzeltilerek doğrulandı',
        llm_repair: 'MDX onarıldı ve SSAS üzerinde doğrulandı',
      };
      const validationNote = `<div style="font-size:.75rem;color:#047857;margin-top:8px">✓ ${escHtml(attemptLabels[data.attempt] || 'SSAS üzerinde doğrulandı')}</div>`;

      if (data.status === 'no_data') {
        if (out) out.innerHTML = `${validationNote}<div style="font-size:.8rem;color:var(--muted);margin-top:8px">Sorgu geçerli, fakat seçilen filtreler için veri bulunamadı.</div>`;
        return;
      }

      const cols = data.columns.map(c => c.name);
      let html = '<div class="result-table-wrap"><table class="result-table"><thead><tr>';
      cols.forEach(c => {
        const short = c.replace(/\[Measures\]\./, '').replace(/[\[\]]/g, '');
        html += `<th title="${escHtml(c)}">${escHtml(short)}</th>`;
      });
      html += '</tr></thead><tbody>';
      data.rows.slice(0, 100).forEach(row => {
        html += '<tr>';
        cols.forEach(c => {
          const val     = row[c];
          const display = val == null ? '—' : (typeof val === 'number' ? val.toLocaleString() : val);
          html += `<td>${escHtml(String(display))}</td>`;
        });
        html += '</tr>';
      });
      html += '</tbody></table></div>';
      html += `<div class="ssas-meta">${data.row_count} row(s)${data.elapsed_ms ? ' &middot; SSAS: ' + data.elapsed_ms + 'ms' : ''}</div>`;
      html += validationNote;
      if (data.cache_updated) html += '<div style="font-size:.73rem;color:var(--muted);margin-top:4px">Doğrulanmış MDX cache kaydına işlendi.</div>';

      if (out) out.innerHTML = html;
    } catch(e) {
      if (out) out.innerHTML = `<div style="color:#dc2626;font-size:.8rem;margin-top:8px">Request failed: ${escHtml(e.message)}</div>`;
    } finally {
      if (btn) { btn.disabled = false; btn.textContent = 'Run on SSAS'; }
    }
  }

  async function sendFeedback(type) {
    if (currentFeedback === type) return;
    currentFeedback = type;

    const btnPos  = document.getElementById('btnPos');
    const btnNeg  = document.getElementById('btnNeg');
    const sentEl  = document.getElementById('feedbackSent');

    btnPos.classList.remove('active-pos');
    btnNeg.classList.remove('active-neg');

    if (type === 'positive') btnPos.classList.add('active-pos');
    else                     btnNeg.classList.add('active-neg');

    try {
      await fetch('/demo/feedback', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          pair_id:       currentPairId,
          question:      currentQuestion,
          cube_name:     currentCube || '',
          feedback:      type,
          user_question: currentQuestion,  // always the raw text the user typed
        }),
      });
      sentEl.textContent = type === 'positive' ? 'Marked as helpful' : 'Flagged for review';
      sentEl.classList.remove('hidden');
    } catch (e) {
      sentEl.textContent = 'Could not save feedback.';
      sentEl.style.color = 'var(--red)';
      sentEl.classList.remove('hidden');
    }
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  document.getElementById('question').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); ask(); }
  });
</script>
</body>
</html>
